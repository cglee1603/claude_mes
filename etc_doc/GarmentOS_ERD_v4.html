// ════════════════════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════════════════════
function tblH(tid){
  const t=TABLES[tid];
  let h=HH;
  const badges=[];
  if(t.harness?.length) badges.push(...t.harness.map(()=>'H'));
  const hasNew=t.isNew, hasPart=t.isPartitioned, hasMod=t.isModified;
  if(t.harness?.length||hasNew||hasPart||hasMod) h+=18;
  return h+t.cols.length*CH;
}
function tblBox(tid){const t=TABLES[tid];return{x:t.x,y:t.y,w:TW,h:tblH(tid)};}

function renderZones(){
  const canvas=document.getElementById('canvas');
  ZONES.forEach(z=>{
    const d=document.createElement('div');
    d.className='zone-bg';
    d.style.cssText=`left:${z.x}px;top:${z.y}px;width:${z.w}px;height:${z.h}px;background:${z.color};border:1px dashed ${z.border};`;
    canvas.insertBefore(d,canvas.firstChild);
    if(z.label){
      const l=document.createElement('div');
      l.className='zone-lbl';
      l.style.cssText=`left:${z.x+10}px;top:${z.y+6}px;color:${z.tc};`;
      l.textContent=z.label;
      canvas.insertBefore(l,canvas.firstChild);
    }
  });
}

function renderTables(){
  const tc=document.getElementById('tc');
  for(const[tid,tbl] of Object.entries(TABLES)){
    const ly=LAYERS[tbl.layer];
    const div=document.createElement('div');
    div.className='tbl'+(tbl.isView?' isview':'');
    div.id='tbl-'+tid;
    div.style.cssText=`left:${tbl.x}px;top:${tbl.y}px;`;
    div.onclick=()=>openDetail(tid);
    div.onmouseenter=()=>hl(tid);
    div.onmouseleave=()=>clearHl();

    let h=`<div class="thdr" style="background:${ly.color}">`;
    h+=`<span class="ticon">${tbl.icon}</span>`;
    h+=`<span class="tname">${tid}</span>`;
    if(tbl.isView) h+=`<span class="vbadge">VIEW</span>`;
    if(tbl.harness?.length) h+=tbl.harness.map(x=>`<span class="hbadge">🛡${x}</span>`).join('');
    h+='</div>';

    // badge row
    const badgeParts=[];
    if(tbl.isNew) badgeParts.push(`<span class="nbadge">🆕 NEW</span>`);
    if(tbl.isPartitioned) badgeParts.push(`<span class="pbadge">⬡ PART</span>`);
    if(tbl.isModified) badgeParts.push(`<span class="mbadge">🔄</span>`);
    if(tbl.harness?.length) badgeParts.push(...tbl.harness.map(x=>`<span class="hbadge">${x}</span>`));
    if(badgeParts.length) h+=`<div class="badge-row">${badgeParts.join('')}</div>`;

    for(const c of tbl.cols){
      const pk=c.b.includes('pk'),fk=c.b.includes('fk');
      let cb='';
      if(pk&&fk) cb='<span class="cb cb-pk">PK</span>';
      else if(pk) cb='<span class="cb cb-pk">PK</span>';
      else if(fk) cb='<span class="cb cb-fk">FK</span>';
      else if(c.b.includes('uq')&&c.b.includes('seq')) cb='<span class="cb cb-sq">SQ</span>';
      else if(c.b.includes('uq')) cb='<span class="cb cb-uq">UQ</span>';
      else if(c.b.includes('gen')) cb='<span class="cb cb-gn">GN</span>';
      else cb='<span class="cb-sp"></span>';
      h+=`<div class="crow${pk?' pkr':fk?' fkr':''}">${cb}<span class="cn">${c.n}</span><span class="ct">${c.t}</span></div>`;
    }
    div.innerHTML=h;
    tc.appendChild(div);
  }
}

function renderLines(){
  const svg=document.getElementById('svglines');
  svg.innerHTML='';
  for(const rel of RELATIONS){
    const ft=TABLES[rel.from],tt=TABLES[rel.to];
    if(!ft||!tt) continue;
    const fb=tblBox(rel.from),tb=tblBox(rel.to);
    let sx,sy,ex,ey,vert=false;
    if(fb.x+TW<tb.x-8){sx=fb.x+TW;sy=fb.y+HH/2;ex=tb.x;ey=tb.y+HH/2;}
    else if(fb.x>tb.x+TW+8){sx=fb.x;sy=fb.y+HH/2;ex=tb.x+TW;ey=tb.y+HH/2;}
    else if(fb.y+fb.h<tb.y){sx=fb.x+TW/2;sy=fb.y+fb.h;ex=tb.x+TW/2;ey=tb.y;vert=true;}
    else{sx=fb.x+TW/2;sy=fb.y;ex=tb.x+TW/2;ey=tb.y+tb.h;vert=true;}
    const mx=(sx+ex)/2,my=(sy+ey)/2;
    let d=vert?`M${sx},${sy} C${sx},${my} ${ex},${my} ${ex},${ey}`
             :`M${sx},${sy} C${mx},${sy} ${mx},${ey} ${ex},${ey}`;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','rel-line');
    g.setAttribute('data-from',rel.from);
    g.setAttribute('data-to',rel.to);
    g.style.color=rel.color;g.style.opacity='0.55';
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',d);path.setAttribute('fill','none');
    path.setAttribute('stroke','currentColor');path.setAttribute('stroke-width','1.5');
    if(rel.nullable) path.setAttribute('stroke-dasharray','5,3');
    g.appendChild(path);
    const sz=7;
    if(!vert){
      const p2=document.createElementNS('http://www.w3.org/2000/svg','path');
      const dir=sx<ex?1:-1;
      p2.setAttribute('d',`M${sx},${sy} L${sx-sz*dir*1.2},${sy-sz} M${sx},${sy} L${sx-sz*dir*1.2},${sy+sz}`);
      p2.setAttribute('fill','none');p2.setAttribute('stroke','currentColor');p2.setAttribute('stroke-width','1.1');
      g.appendChild(p2);
    } else {
      const p2=document.createElementNS('http://www.w3.org/2000/svg','path');
      const dir=sy<ey?1:-1;
      p2.setAttribute('d',`M${sx-sz},${sy+dir*sz*1.2} L${sx},${sy} M${sx+sz},${sy+dir*sz*1.2} L${sx},${sy}`);
      p2.setAttribute('fill','none');p2.setAttribute('stroke','currentColor');p2.setAttribute('stroke-width','1.1');
      g.appendChild(p2);
    }
    svg.appendChild(g);
  }
}

// ── HIGHLIGHT / FILTER ──────────────────────────────────────────────────────
let selTable=null,linesOn=true,curFilter='all';

function getConn(tid){
  const s=new Set([tid]);
  RELATIONS.forEach(r=>{if(r.from===tid)s.add(r.to);if(r.to===tid)s.add(r.from);});
  return s;
}
function hl(tid){
  if(selTable) return;
  const conn=getConn(tid);
  document.querySelectorAll('.tbl').forEach(el=>{
    const id=el.id.replace('tbl-','');
    el.classList.toggle('hl',conn.has(id));
    el.classList.toggle('dim',!conn.has(id));
  });
  document.querySelectorAll('.rel-line').forEach(el=>{
    const ok=el.getAttribute('data-from')===tid||el.getAttribute('data-to')===tid;
    el.style.opacity=ok?'1':'0.05';
    el.style.filter=ok?'drop-shadow(0 0 3px currentColor)':'';
  });
}
function clearHl(){
  if(selTable) return;
  document.querySelectorAll('.tbl').forEach(el=>el.classList.remove('hl','dim'));
  document.querySelectorAll('.rel-line').forEach(el=>{el.style.opacity='0.55';el.style.filter='';});
}

const LAYER_GROUPS={
  lv4:['lv4','mst'],wh:['wh','lv4','mst'],cut:['cut','lv4','mst'],
  core:['lv3','lv4','mst'],sew:['sew','lv3','lv4','mst'],fin:['fin','lv3','lv4','mst'],
};

function filter(lyr,btn){
  curFilter=lyr;
  document.querySelectorAll('.lb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tbl').forEach(el=>{
    const tid=el.id.replace('tbl-','');
    const tbl=TABLES[tid];
    let show=false;
    if(lyr==='all') show=true;
    else if(lyr==='new') show=tbl.isNew===true;
    else if(lyr==='vw') show=tbl.isView===true||tbl.isPartitioned===true;
    else show=(LAYER_GROUPS[lyr]||[]).includes(tbl?.layer)||tbl?.layer===lyr;
    el.style.opacity=show?'1':'0.07';
    el.style.pointerEvents=show?'':'none';
  });
  document.querySelectorAll('.rel-line').forEach(el=>{
    if(lyr==='all'){el.style.display='';return;}
    const fl=TABLES[el.getAttribute('data-from')]?.layer;
    const tl=TABLES[el.getAttribute('data-to')]?.layer;
    const fg=LAYER_GROUPS[lyr]||[];
    const show=fg.includes(fl)||fg.includes(tl)||fl===lyr||tl===lyr;
    el.style.display=show?'':'none';
  });
}
function toggleLines(){
  linesOn=!linesOn;
  document.getElementById('svglines').style.display=linesOn?'':'none';
  document.getElementById('ltog').classList.toggle('active',linesOn);
}

// ── DETAIL PANEL ────────────────────────────────────────────────────────────
function openDetail(tid){
  selTable=tid;
  const tbl=TABLES[tid],ly=LAYERS[tbl.layer];
  const conn=getConn(tid);
  document.querySelectorAll('.tbl').forEach(el=>{
    const id=el.id.replace('tbl-','');
    el.classList.toggle('hl',conn.has(id));
    el.classList.toggle('dim',!conn.has(id));
  });
  document.querySelectorAll('.rel-line').forEach(el=>{
    const ok=el.getAttribute('data-from')===tid||el.getAttribute('data-to')===tid;
    el.style.opacity=ok?'1':'0.06';
  });
  document.getElementById('dn').textContent=tid;
  document.getElementById('dn').style.color=ly.color;
  const tags=[];
  if(tbl.isNew) tags.push('<span class="nbadge">🆕 NEW</span>');
  if(tbl.isPartitioned) tags.push('<span class="pbadge">⬡ PARTITION</span>');
  if(tbl.isView) tags.push('<span class="vbadge">⬡ VIEW</span>');
  if(tbl.isModified) tags.push('<span class="mbadge" style="color:#FCD34D">🔄 수정됨</span>');
  document.getElementById('dl').innerHTML=`${ly.label} · ${tbl.desc}<br>${tags.join(' ')}`;
  let body='';
  if(tbl.harness?.length){
    body+=`<div class="ds"><div class="dst">🛡 Harness 방어</div>${tbl.harness.map(h=>`<span class="hbadge" style="font-size:10px;margin:2px;">${h}</span>`).join('')}</div>`;
  }
  body+=`<div class="ds"><div class="dst">컬럼 (${tbl.cols.length}개)</div>`;
  for(const c of tbl.cols){
    const badges=c.b.map(b=>({pk:'PK',fk:'FK',uq:'UQ',seq:'SQ',gen:'GN'}[b]||b)).filter(Boolean);
    body+=`<div class="dcr"><div class="dcn">${badges.length?`[${badges.join(',')}] `:''}${c.n}</div><div class="dct">${c.t}${c.fkTo?` → ${c.fkTo}`:''}</div></div>`;
  }
  body+='</div>';
  const myRels=RELATIONS.filter(r=>r.from===tid||r.to===tid);
  if(myRels.length){
    body+=`<div class="ds"><div class="dst">관계 (${myRels.length}개)</div>`;
    for(const r of myRels){
      if(r.from===tid) body+=`<div class="drr"><span class="dra" style="color:${r.color}">→FK</span><span class="drt">${r.to}</span><span style="color:var(--muted);font-size:9.5px">${r.nullable?'NULL':'NOT NULL'}</span></div>`;
      else body+=`<div class="drr"><span class="dra" style="color:${r.color}">←1:N</span><span class="drt">${r.from}</span></div>`;
    }
    body+='</div>';
  }
  document.getElementById('db').innerHTML=body;
  document.getElementById('detail').classList.add('open');
}
function closeDetail(){
  selTable=null;
  document.getElementById('detail').classList.remove('open');
  clearHl();
}

// ── PAN / ZOOM ──────────────────────────────────────────────────────────────
let sc=0.55,tx=15,ty=8,isDrag=false,sx0,sy0,tx0,ty0;
function applyT(){
  document.getElementById('canvas').style.transform=`scale(${sc}) translate(${tx}px,${ty}px)`;
  document.getElementById('zi').textContent=Math.round(sc*100)+'%';
}
function doZoom(d,cx,cy){
  const w=document.getElementById('cwrap');
  const r=w.getBoundingClientRect();
  const px=(cx??r.width/2)/sc-tx,py=(cy??r.height/2)/sc-ty;
  sc=Math.min(2,Math.max(0.2,sc+d));
  tx=(cx??r.width/2)/sc-px;ty=(cy??r.height/2)/sc-py;
  applyT();
}
function resetView(){sc=0.55;tx=15;ty=8;applyT();}

const cw=document.getElementById('cwrap');
cw.addEventListener('mousedown',e=>{
  if(e.target.closest('.tbl')||e.target.closest('#detail')) return;
  isDrag=true;sx0=e.clientX;sy0=e.clientY;tx0=tx;ty0=ty;cw.classList.add('grabbing');
});
cw.addEventListener('mousemove',e=>{if(!isDrag)return;tx=tx0+(e.clientX-sx0)/sc;ty=ty0+(e.clientY-sy0)/sc;applyT();});
cw.addEventListener('mouseup',()=>{isDrag=false;cw.classList.remove('grabbing');});
cw.addEventListener('mouseleave',()=>{isDrag=false;cw.classList.remove('grabbing');});
cw.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=cw.getBoundingClientRect();
  doZoom(e.deltaY<0?.1:-.1,e.clientX-r.left,e.clientY-r.top);
},{passive:false});
cw.addEventListener('click',e=>{if(!e.target.closest('.tbl')&&!e.target.closest('#detail'))closeDetail();});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeDetail();
  if(e.key==='0')resetView();
  if(e.key==='+'||e.key==='=')doZoom(.1);
  if(e.key==='-')doZoom(-.1);
});

// ── INIT ────────────────────────────────────────────────────────────────────
renderZones();
renderTables();
renderLines();
applyT();
