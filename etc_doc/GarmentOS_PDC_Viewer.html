<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>GarmentOS PDC Viewer — 공정별 업무 워크플로우</title>
<style>
:root{
  --bg:#0D1117;--surf:#161B22;--surf2:#1C2128;--bdr:#21262D;--bdr2:#30363D;
  --txt:#E6EDF3;--muted:#8B949E;--accent:#58A6FF;--green:#3FB950;
  --wh:#DC8A00;--cut:#3B82F6;--sew:#06B6D4;--fin:#10B981;
  --red:#FF7B72;--yellow:#E3B341;--blue:#79C0FF;--purple:#D2A8FF;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
/* ── TOPBAR ── */
#topbar{height:48px;background:var(--surf);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px;padding:0 14px;flex-shrink:0;z-index:100;}
.tb-logo{font-weight:900;font-size:14px;letter-spacing:-.3px;}
.tb-sub{font-size:10.5px;color:var(--muted);}
.tb-sep{width:1px;height:22px;background:var(--bdr);flex-shrink:0;margin:0 4px;}
#searchbox{flex:1;max-width:260px;background:var(--bg);border:1px solid var(--bdr2);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--txt);outline:none;}
#searchbox::placeholder{color:var(--muted);}
#searchbox:focus{border-color:var(--accent);}
.flt{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--bdr);background:transparent;color:var(--muted);transition:all .15s;}
.flt:hover,.flt.active{color:#fff;border-color:transparent;}
.flt.all.active{background:#334155;}
.flt.wh.active{background:var(--wh);}
.flt.cut.active{background:var(--cut);}
.flt.sew.active{background:var(--sew);}
.flt.fin.active{background:var(--fin);}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:6px;}
.viewbtn{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bdr2);background:var(--surf2);color:var(--muted);transition:all .15s;}
.viewbtn:hover{background:var(--bdr2);color:var(--txt);}
.viewbtn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
/* ── MAIN LAYOUT ── */
#main{display:flex;flex:1;overflow:hidden;}
/* ── SIDENAV ── */
#sidenav{width:270px;background:var(--surf);border-right:1px solid var(--bdr);overflow-y:auto;flex-shrink:0;padding-bottom:20px;}
.proc-header{padding:10px 12px 6px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;border-bottom:1px solid var(--bdr);}
.proc-header:hover{background:var(--surf2);}
.proc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.proc-title{font-size:12px;font-weight:700;flex:1;}
.proc-count{font-size:10px;color:var(--muted);background:var(--bdr2);padding:1px 6px;border-radius:8px;}
.proc-chevron{font-size:10px;color:var(--muted);transition:transform .2s;}
.proc-header.open .proc-chevron{transform:rotate(90deg);}
.act-section{padding:4px 8px;}
.act-label{font-size:9.5px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;padding:6px 8px 3px;}
.task-item{padding:5px 10px 5px 22px;border-radius:6px;cursor:pointer;font-size:11.5px;color:var(--muted);transition:all .15s;display:flex;align-items:center;gap:6px;margin:1px 2px;}
.task-item:hover{background:var(--surf2);color:var(--txt);}
.task-item.active{color:#fff;font-weight:600;}
.task-item .tid{font-family:'Consolas','Courier New',monospace;font-size:10px;font-weight:700;min-width:62px;flex-shrink:0;}
.task-item .tname-nav{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;}
.task-item .h-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;}
.nav-hidden{display:none;}
/* ── CONTENT ── */
#content{flex:1;overflow-y:auto;background:var(--bg);}
/* ── WELCOME ── */
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--muted);}
#welcome .wicon{font-size:56px;}
#welcome h2{font-size:18px;color:var(--txt);}
#welcome p{font-size:13px;text-align:center;max-width:360px;line-height:1.6;}
.stats-row{display:flex;gap:12px;margin-top:8px;}
.stat-card{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:12px 20px;text-align:center;}
.stat-n{font-size:24px;font-weight:800;color:var(--accent);}
.stat-l{font-size:11px;color:var(--muted);}
/* ── TABLE INDEX ── */
#tbl-index{padding:24px;}
.ti-title{font-size:16px;font-weight:700;margin-bottom:16px;}
.ti-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;}
.ti-card{background:var(--surf);border:1px solid var(--bdr);border-radius:8px;padding:12px;cursor:pointer;transition:border-color .15s;}
.ti-card:hover{border-color:var(--accent);}
.ti-tname{font-family:'Consolas','Courier New',monospace;font-size:12px;font-weight:700;margin-bottom:8px;color:var(--accent);}
.ti-ops{display:flex;flex-wrap:wrap;gap:4px;}
.ti-op{font-size:9.5px;padding:1px 5px;border-radius:4px;font-weight:600;}
.ti-op.C{background:rgba(59,251,36,.15);color:#3fb950;}
.ti-op.U{background:rgba(251,191,36,.15);color:#e3b341;}
.ti-op.R{background:rgba(88,166,255,.12);color:#58a6ff;}
/* ── TASK DETAIL ── */
#task-view{padding:24px;max-width:900px;}
.tv-header{margin-bottom:20px;}
.tv-id-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.tv-id{font-family:'Consolas','Courier New',monospace;font-size:13px;font-weight:700;padding:3px 10px;border-radius:6px;color:#fff;}
.tv-isa{font-size:10.5px;color:var(--muted);border:1px solid var(--bdr2);padding:2px 8px;border-radius:5px;}
.hbadge{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:5px;background:rgba(239,68,68,.2);color:#ff7b72;border:1px solid rgba(239,68,68,.3);}
.tv-name{font-size:20px;font-weight:800;margin-bottom:8px;}
.tv-trigger{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-bottom:12px;}
.tv-trigger strong{color:var(--txt);}
/* flow chips */
.flow-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.flow-chip{font-family:'Consolas','Courier New',monospace;font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:6px;cursor:pointer;border:1px solid var(--bdr2);background:var(--surf);color:var(--muted);transition:all .15s;}
.flow-chip:hover{border-color:var(--accent);color:var(--txt);}
.flow-chip.cur{color:#fff;}
.flow-arrow{color:var(--muted);font-size:12px;}
/* quick stats */
.quick-stats{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.qs{background:var(--surf);border:1px solid var(--bdr);border-radius:8px;padding:8px 14px;text-align:center;min-width:70px;}
.qs-n{font-size:18px;font-weight:800;}
.qs-l{font-size:9.5px;color:var(--muted);}
/* sections */
.section{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;margin-bottom:14px;overflow:hidden;}
.sec-hdr{padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;border-bottom:1px solid var(--bdr);}
.sec-hdr:hover{background:var(--surf2);}
.sec-icon{font-size:14px;}
.sec-title{font-size:12.5px;font-weight:700;flex:1;}
.sec-chevron{font-size:10px;color:var(--muted);transition:transform .2s;}
.sec-body{padding:12px 14px;}
.sec-collapsed .sec-body{display:none;}
.sec-collapsed .sec-chevron{transform:rotate(-90deg);}
/* pre/post */
.cond-list{list-style:none;}
.cond-item{padding:4px 0;font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(255,255,255,.04);}
.cond-item:last-child{border:none;}
.cond-item::before{content:'→';color:var(--accent);font-size:11px;}
/* docs */
.doc-tag{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.06);border:1px solid var(--bdr2);border-radius:5px;padding:3px 8px;font-size:11px;margin:3px 3px 3px 0;}
/* tables read/write */
.tbl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.tbl-card{border-radius:8px;padding:10px 12px;border:1px solid var(--bdr2);}
.tbl-card.read-side{background:rgba(88,166,255,.05);border-color:rgba(88,166,255,.2);}
.tbl-card.write-side{background:rgba(63,185,80,.05);border-color:rgba(63,185,80,.2);}
.tc-head{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;}
.tc-head.r{color:var(--blue);}.tc-head.w{color:var(--green);}
.tbl-entry{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);display:grid;gap:2px;}
.tbl-entry:last-child{border:none;}
.te-top{display:flex;align-items:center;gap:6px;}
.te-name{font-family:'Consolas','Courier New',monospace;font-size:11.5px;font-weight:700;color:var(--txt);cursor:pointer;}
.te-name:hover{color:var(--accent);}
.op-badge{font-size:9px;font-weight:800;padding:1px 5px;border-radius:3px;}
.op-C{background:rgba(63,185,80,.2);color:var(--green);}
.op-U{background:rgba(227,179,65,.2);color:var(--yellow);}
.op-R{background:rgba(88,166,255,.15);color:var(--blue);}
.te-cols{font-family:'Consolas','Courier New',monospace;font-size:9.5px;color:var(--muted);line-height:1.5;}
.te-why{font-size:10px;color:var(--muted);margin-top:2px;}
/* steps */
.step-list{list-style:none;counter-reset:step;}
.step-item{counter-increment:step;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);display:flex;gap:10px;font-size:12px;}
.step-item:last-child{border:none;}
.step-item::before{content:counter(step);min-width:22px;height:22px;background:var(--bdr2);color:var(--muted);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
/* validation */
.val-item{padding:6px 10px;border-radius:6px;margin-bottom:5px;font-size:11.5px;display:flex;gap:8px;align-items:flex-start;}
.val-item:last-child{margin-bottom:0;}
.val-lvl{font-size:10px;font-weight:800;padding:1px 6px;border-radius:4px;flex-shrink:0;margin-top:1px;}
.lE{background:rgba(239,68,68,.2);color:var(--red);}
.lW{background:rgba(227,179,65,.2);color:var(--yellow);}
.lI{background:rgba(88,166,255,.15);color:var(--blue);}
.val-item.lEb{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);}
.val-item.lWb{background:rgba(227,179,65,.05);border:1px solid rgba(227,179,65,.12);}
.val-item.lIb{background:rgba(88,166,255,.05);border:1px solid rgba(88,166,255,.12);}
/* roles */
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.role-card{background:var(--surf2);border-radius:8px;padding:10px 12px;}
.role-lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px;}
.role-chip{display:inline-block;background:rgba(255,255,255,.08);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:600;margin:2px 2px 2px 0;}
/* exceptions */
.exc-item{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11.5px;color:var(--muted);display:flex;gap:6px;}
.exc-item::before{content:'⚠';font-size:11px;flex-shrink:0;}
.exc-item:last-child{border:none;}
/* search highlight */
.sh{background:rgba(227,179,65,.3);border-radius:2px;}
</style>
</head>
<body>

<div id="topbar">
  <span class="tb-logo">🏭 GarmentOS</span>
  <span class="tb-sub">PDC Viewer — 공정별 업무 워크플로우</span>
  <div class="tb-sep"></div>
  <input id="searchbox" type="text" placeholder="태스크명, 테이블명 검색..." oninput="doSearch(this.value)">
  <div class="tb-sep"></div>
  <button class="flt all active" onclick="filterProc('all',this)">전체</button>
  <button class="flt wh" onclick="filterProc('WH',this)">Warehouse</button>
  <button class="flt cut" onclick="filterProc('CUT',this)">CUT</button>
  <button class="flt sew" onclick="filterProc('SEW',this)">Sewing</button>
  <button class="flt fin" onclick="filterProc('FIN',this)">Finishing</button>
  <div class="tb-r">
    <button class="viewbtn active" id="vTask" onclick="setView('task')">📋 태스크</button>
    <button class="viewbtn" id="vTable" onclick="setView('table')">🗄 테이블 인덱스</button>
  </div>
</div>

<div id="main">
  <div id="sidenav" id="sidenav"></div>
  <div id="content">
    <div id="welcome">
      <div class="wicon">📋</div>
      <h2>Process Data Contract Viewer</h2>
      <p>왼쪽 트리에서 태스크를 선택하면 입력·처리·출력·검증 등 전체 PDC를 확인합니다.</p>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-n">37</div><div class="stat-l">태스크</div></div>
        <div class="stat-card"><div class="stat-n">14</div><div class="stat-l">Activity</div></div>
        <div class="stat-card"><div class="stat-n">4</div><div class="stat-l">공정</div></div>
        <div class="stat-card"><div class="stat-n">51</div><div class="stat-l">WRITE 테이블</div></div>
        <div class="stat-card"><div class="stat-n">71</div><div class="stat-l">ERD 테이블</div></div>
      </div>
    </div>
    <div id="tbl-index" style="display:none;"></div>
    <div id="task-view" style="display:none;"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// TASK DATA — 37개 PDC 정의
// ═══════════════════════════════════════════════════════════════════
const PROC_COLOR={WH:'#DC8A00',CUT:'#3B82F6',SEW:'#06B6D4',FIN:'#10B981'};
const PROC_LABEL={WH:'WAREHOUSE',CUT:'CUT',SEW:'SEWING',FIN:'FINISHING'};

const ACTIVITIES={
  'WH-A01':{name:'입고 관리',proc:'WH',tasks:['WH-T01','WH-T02','WH-T03']},
  'WH-A02':{name:'부자재 검사 및 등록',proc:'WH',tasks:['WH-T04','WH-T05']},
  'WH-A03':{name:'출고 및 재고 관리',proc:'WH',tasks:['WH-T06','WH-T07']},
  'CUT-A01':{name:'재단 계획 및 편성',proc:'CUT',tasks:['CUT-T01','CUT-T02','CUT-T03']},
  'CUT-A02':{name:'재단 실행',proc:'CUT',tasks:['CUT-T04','CUT-T05']},
  'CUT-A03':{name:'외주 및 이관',proc:'CUT',tasks:['CUT-T06','CUT-T07','CUT-T08']},
  'SEW-A01':{name:'생산 준비',proc:'SEW',tasks:['SEW-T01','SEW-T02','SEW-T03']},
  'SEW-A02':{name:'자재 수령',proc:'SEW',tasks:['SEW-T04','SEW-T05']},
  'SEW-A03':{name:'봉제 생산',proc:'SEW',tasks:['SEW-T06','SEW-T07','SEW-T08']},
  'SEW-A04':{name:'품질 관리',proc:'SEW',tasks:['SEW-T09','SEW-T10','SEW-T11']},
  'SEW-A05':{name:'안전·준수',proc:'SEW',tasks:['SEW-T12']},
  'FIN-A01':{name:'완성 검사',proc:'FIN',tasks:['FIN-T01','FIN-T02','FIN-T03','FIN-T04','FIN-T05']},
  'FIN-A02':{name:'포장 및 서류',proc:'FIN',tasks:['FIN-T06']},
  'FIN-A03':{name:'실적 보고',proc:'FIN',tasks:['FIN-T07','FIN-T08']},
  'FIN-A04':{name:'출하 관리',proc:'FIN',tasks:['FIN-T09','FIN-T10']},
};

// Compact task definition helper
// reads/writes: {t:'table', c:['cols'], op:'C|U|R', why:'reason'}
const T={

// ═══ TABLE INDEX (CRUD Mapping) ══════════════════════════════════════
function buildTableIndex(){
  const idx={};
  Object.entries(T).forEach(([tid,t])=>{
    (t.reads||[]).forEach(r=>{if(!idx[r.t])idx[r.t]={};if(!idx[r.t][tid])idx[r.t][tid]={ops:[]};if(!idx[r.t][tid].ops.includes('R'))idx[r.t][tid].ops.push('R');});
    (t.writes||[]).forEach(w=>{if(!idx[w.t])idx[w.t]={};if(!idx[w.t][tid])idx[w.t][tid]={ops:[]};const ops=w.op.split('/');ops.forEach(op=>{if(!idx[w.t][tid].ops.includes(op))idx[w.t][tid].ops.push(op);});});
  });
  return idx;
}
const TABLE_IDX=buildTableIndex();

// ═══ UI LOGIC ════════════════════════════════════════════════════════
let curTask=null, curView='task', curFilter='all', searchQ='';

function getColor(proc){return PROC_COLOR[proc]||'#8B949E';}

function renderNav(){
  const nav=document.getElementById('sidenav');
  nav.innerHTML='';
  Object.entries(ACTIVITIES).forEach(([actId,act])=>{
    if(curFilter!=='all'&&act.proc!==curFilter) return;
    const tasks=act.tasks.filter(tid=>{
      const t=T[tid];if(!t)return false;
      if(searchQ){
        const q=searchQ.toLowerCase();
        if(!tid.toLowerCase().includes(q)&&!t.name.toLowerCase().includes(q)){
          const tblMatch=(t.reads||[]).some(r=>r.t.toLowerCase().includes(q))||
                         (t.writes||[]).some(w=>w.t.toLowerCase().includes(q));
          if(!tblMatch) return false;
        }
      }
      return true;
    });
    if(!tasks.length) return;
    // proc header (only once per proc group)
    const procId='proc-'+act.proc;
    if(!nav.querySelector('#'+procId)){
      const ph=document.createElement('div');
      ph.className='proc-header open';ph.id=procId;
      ph.innerHTML=`<div class="proc-dot" style="background:${getColor(act.proc)}"></div><span class="proc-title">${PROC_LABEL[act.proc]}</span><span class="proc-count" id="cnt-${act.proc}"></span><span class="proc-chevron">▶</span>`;
      ph.onclick=()=>{ph.classList.toggle('open');const body=nav.querySelector('#body-'+act.proc);if(body)body.style.display=ph.classList.contains('open')?'':'none';};
      nav.appendChild(ph);
      const body=document.createElement('div');body.id='body-'+act.proc;nav.appendChild(body);
    }
    const body=nav.querySelector('#body-'+act.proc);
    const as=document.createElement('div');as.className='act-section';
    as.innerHTML=`<div class="act-label">${actId} · ${act.name}</div>`;
    tasks.forEach(tid=>{
      const t=T[tid];if(!t)return;
      const hasH=t.harness&&t.harness.length;
      const item=document.createElement('div');
      item.className='task-item'+(curTask===tid?' active':'');
      item.id='nav-'+tid;
      item.style.borderLeft=curTask===tid?`3px solid ${getColor(t.proc)}`:'3px solid transparent';
      if(curTask===tid) item.style.background=getColor(t.proc)+'22';
      item.innerHTML=`<span class="tid" style="color:${getColor(t.proc)}">${tid}</span><span class="tname-nav">${t.name}</span>${hasH?`<span class="h-dot" title="${t.harness.join(', ')}"></span>`:''}`;
      item.onclick=()=>selectTask(tid);
      as.appendChild(item);
    });
    body.appendChild(as);
  });
  // update proc counts
  Object.keys(PROC_COLOR).forEach(proc=>{
    const el=nav.querySelector('#cnt-'+proc);
    if(el) el.textContent=Object.values(T).filter(t=>t.proc===proc).length+'개';
  });
}

function selectTask(tid){
  curTask=tid;
  setView('task');
  renderNav();
  renderTaskDetail(tid);
}

function renderTaskDetail(tid){
  const t=T[tid];
  if(!t){return;}
  const c=getColor(t.proc);
  document.getElementById('welcome').style.display='none';
  document.getElementById('tbl-index').style.display='none';
  const tv=document.getElementById('task-view');
  tv.style.display='block';

  const readCnt=(t.reads||[]).length;
  const writeCnt=(t.writes||[]).length;
  const stepCnt=(t.steps||[]).length;
  const valCnt=(t.vals||[]).length;

  let html=`<div class="tv-header">
<div class="tv-id-row">
  <span class="tv-id" style="background:${c}">${tid}</span>
  <span class="tv-isa">${t.isa95}</span>
  ${(t.harness||[]).map(h=>`<span class="hbadge">🛡 ${h}</span>`).join('')}
</div>
<div class="tv-name">${t.name}</div>
<div class="tv-trigger">🔔 트리거: <strong>${t.trigger}</strong></div>`;

  // flow chips
  html+=`<div class="flow-row">`;
  if(t.prev&&t.prev.length){t.prev.forEach(p=>{html+=`<span class="flow-chip" onclick="selectTask('${p}')" title="${T[p]?.name||p}">${p}</span>`;});html+=`<span class="flow-arrow">→</span>`;}
  html+=`<span class="flow-chip cur" style="background:${c};border-color:${c};color:#fff">${tid}</span>`;
  if(t.next&&t.next.length){html+=`<span class="flow-arrow">→</span>`;t.next.forEach(n=>{html+=`<span class="flow-chip" onclick="selectTask('${n}')" title="${T[n]?.name||n}">${n}</span>`;});}
  html+=`</div>`;

  // quick stats
  html+=`<div class="quick-stats">
<div class="qs"><div class="qs-n" style="color:#58a6ff">${readCnt}</div><div class="qs-l">READ 테이블</div></div>
<div class="qs"><div class="qs-n" style="color:#3fb950">${writeCnt}</div><div class="qs-l">WRITE 테이블</div></div>
<div class="qs"><div class="qs-n" style="color:#e3b341">${stepCnt}</div><div class="qs-l">처리 단계</div></div>
<div class="qs"><div class="qs-n" style="color:#ff7b72">${valCnt}</div><div class="qs-l">검증 규칙</div></div>
</div></div>`;

  // Section helper
  function sec(icon,title,body,collapsed=false){
    return`<div class="section${collapsed?' sec-collapsed':''}">
<div class="sec-hdr" onclick="this.parentElement.classList.toggle('sec-collapsed')">
<span class="sec-icon">${icon}</span><span class="sec-title">${title}</span><span class="sec-chevron">▼</span>
</div><div class="sec-body">${body}</div></div>`;
  }

  // Pre/Post conditions
  let preHtml=`<ul class="cond-list">`;
  (t.pre||[]).forEach(c2=>{preHtml+=`<li class="cond-item"><code style="font-size:10.5px;color:#79c0ff">${c2}</code></li>`;});
  preHtml+=`</ul>`;
  if(t.inDocs&&t.inDocs.length){preHtml+=`<div style="margin-top:8px;font-size:11px;color:var(--muted);">📄 입력 문서:</div><div style="margin-top:4px;">${t.inDocs.map(d=>`<span class="doc-tag">📄 ${d}</span>`).join('')}</div>`;}
  html+=sec('🔔','선행 조건',preHtml);

  // Inputs (READ)
  let inHtml=`<div class="tbl-grid"><div class="tbl-card read-side"><div class="tc-head r">READ 테이블 (${readCnt}개)</div>`;
  (t.reads||[]).forEach(r=>{
    inHtml+=`<div class="tbl-entry"><div class="te-top"><span class="op-badge op-R">R</span><span class="te-name" onclick="showTableRef('${r.t}')">${r.t}</span></div><div class="te-cols">${r.c.join(', ')}</div><div class="te-why">↳ ${r.why}</div></div>`;
  });
  inHtml+=`</div></div>`;
  html+=sec('📥','입력',inHtml);

  // Processing steps
  let stepsHtml=`<ol class="step-list">`;
  (t.steps||[]).forEach(s=>{stepsHtml+=`<li class="step-item">${s}</li>`;});
  stepsHtml+=`</ol>`;
  html+=sec('⚙️','처리 단계',stepsHtml);

  // Outputs (WRITE)
  let outHtml=`<div class="tbl-grid"><div class="tbl-card write-side"><div class="tc-head w">WRITE 테이블 (${writeCnt}개)</div>`;
  (t.writes||[]).forEach(w=>{
    outHtml+=`<div class="tbl-entry"><div class="te-top"><span class="op-badge op-${w.op.split('/')[0]}">${w.op}</span><span class="te-name" onclick="showTableRef('${w.t}')">${w.t}</span></div><div class="te-cols">${w.c.join(', ')}</div><div class="te-why">↳ ${w.why}</div></div>`;
  });
  outHtml+=`</div></div>`;
  if(t.outDocs&&t.outDocs.length){outHtml+=`<div style="margin-top:10px;font-size:11px;color:var(--muted);">📤 출력 문서:</div><div style="margin-top:4px;">${t.outDocs.map(d=>`<span class="doc-tag">📤 ${d}</span>`).join('')}</div>`;}
  html+=sec('📤','출력',outHtml);

  // Validations
  let valHtml='';
  (t.vals||[]).forEach(v=>{
    const map={E:'lEb',W:'lWb',I:'lIb'};
    const lmap={E:'ERROR',W:'WARN',I:'INFO'};
    valHtml+=`<div class="val-item ${map[v.lvl]}"><span class="val-lvl l${v.lvl}">${lmap[v.lvl]}</span>${v.rule}</div>`;
  });
  html+=sec('✅','유효성 검증 · 비즈니스 규칙',valHtml);

  // Post conditions
  let postHtml=`<ul class="cond-list">`;
  (t.post||[]).forEach(p=>{postHtml+=`<li class="cond-item"><code style="font-size:10.5px;color:#3fb950">${p}</code></li>`;});
  postHtml+=`</ul>`;
  html+=sec('🏁','사후 조건',postHtml,true);

  // Governance
  let govHtml=`<div class="role-grid"><div class="role-card"><div class="role-lbl">실행 (Executor)</div>${(t.roles.exec||[]).map(r=>`<span class="role-chip">👤 ${r}</span>`).join('')}</div><div class="role-card"><div class="role-lbl">승인 (Approver)</div>${(t.roles.approve||[]).length?(t.roles.approve.map(r=>`<span class="role-chip">✍️ ${r}</span>`).join('')):'<span style="color:var(--muted);font-size:11px">승인 없음</span>'}</div></div>`;
  html+=sec('👤','거버넌스 (역할·책임)',govHtml,true);

  // Exceptions
  let excHtml='';
  (t.exc||[]).forEach(e=>{excHtml+=`<div class="exc-item">${e}</div>`;});
  html+=sec('⚠️','예외 처리',excHtml,true);

  tv.innerHTML=html;
}

function showTableRef(tname){
  setView('table');
  setTimeout(()=>{
    const el=document.getElementById('ti-'+tname);
    if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
  },100);
}

function renderTableIndex(){
  const div=document.getElementById('tbl-index');
  let html=`<div class="ti-title">🗄 테이블 인덱스 — CRUD Responsibility Matrix</div><div style="font-size:12px;color:var(--muted);margin-bottom:16px;">${Object.keys(TABLE_IDX).length}개 테이블 × 37개 태스크 교차 분석</div><div class="ti-grid">`;
  Object.entries(TABLE_IDX).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([tname,tasks])=>{
    html+=`<div class="ti-card" id="ti-${tname}"><div class="ti-tname">${tname}</div><div class="ti-ops">`;
    Object.entries(tasks).forEach(([tid,info])=>{
      const proc=T[tid]?.proc||'?';
      const c=getColor(proc);
      info.ops.forEach(op=>{
        html+=`<span class="ti-op ${op}" title="${tid}: ${op}" style="cursor:pointer;" onclick="selectTask('${tid}')">${op} ${tid}</span>`;
      });
    });
    html+=`</div></div>`;
  });
  html+='</div>';
  div.innerHTML=html;
}

function setView(v){
  curView=v;
  document.getElementById('vTask').classList.toggle('active',v==='task');
  document.getElementById('vTable').classList.toggle('active',v==='table');
  document.getElementById('welcome').style.display=(v==='task'&&!curTask)?'flex':'none';
  document.getElementById('tbl-index').style.display=v==='table'?'block':'none';
  document.getElementById('task-view').style.display=(v==='task'&&curTask)?'block':'none';
  if(v==='table') renderTableIndex();
}

function filterProc(proc,btn){
  curFilter=proc;
  document.querySelectorAll('.flt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderNav();
}

function doSearch(q){
  searchQ=q.trim();
  renderNav();
}

// INIT
renderNav();
</script>
